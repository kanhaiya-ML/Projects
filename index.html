<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #7c3aed;
        }

        #chat-box {
            width: 700px;
            height: 450px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 85%;
            line-height: 1.5;
        }

        .user {
            background: #7c3aed;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #2a2a4a;
            margin-right: auto;
        }

        #upload-area {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            width: 700px;
        }

        #upload-status {
            color: #7c3aed;
            font-size: 0.9rem;
        }

        #input-area {
            display: flex;
            gap: 10px;
            width: 700px;
        }

        #question {
            flex: 1;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid #2a2a4a;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #question:focus {
            border-color: #7c3aed;
        }

        button {
            padding: 14px 24px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #6d28d9; }
        button:disabled { background: #4a4a6a; cursor: not-allowed; }

        .typing {
            color: #7c3aed;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>🤖 RAG Agent</h1>

    <div id="chat-box"></div>

    <div id="upload-area">
        <input type="file" id="pdf-upload" accept=".pdf" />
        <button onclick="uploadPDF()">Upload PDF</button>
        <span id="upload-status"></span>
    </div>

    <div id="input-area">
        <input 
            type="text" 
            id="question" 
            placeholder="Ask something..."
            onkeypress="if(event.key==='Enter') ask()"
        />
        <button onclick="ask()" id="btn">Ask</button>
    </div>

    <script>
        let chatHistory = [];

        function addMessage(text, role) {
            chatHistory.push({text, role});
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function uploadPDF() {
            const file = document.getElementById("pdf-upload").files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append("file", file);
            
            document.getElementById("upload-status").innerText = "Uploading...";
            
            const response = await fetch("https://rag-agent-production-aee3.up.railway.app/upload", {
                method: "POST",
                body: formData
            });
            
            const data = await response.json();
            document.getElementById("upload-status").innerText = data.message;
        }

        async function ask() {
            const input = document.getElementById("question");
            const btn = document.getElementById("btn");
            const question = input.value.trim();

            if (!question) return;

            addMessage(question, "user");
            input.value = "";
            btn.disabled = true;

            const typing = document.createElement("div");
            typing.className = "message bot typing";
            typing.id = "typing";
            typing.innerText = "Thinking...";
            document.getElementById("chat-box").appendChild(typing);

            try {
                const response = await fetch("https://rag-agent-production-aee3.up.railway.app/ask", {
                    method: "POST",
                    // headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question }),
                    signal: AbortSignal.timeout(120000)
                });

                const data = await response.json();

                if (document.getElementById("typing")) {
                    document.getElementById("typing").remove();
                }

                if (data.answer) {
                    addMessage(data.answer, "bot");
                } else {
                    addMessage("Task completed!", "bot");
                }

            } catch (error) {
                if (document.getElementById("typing")) {
                    document.getElementById("typing").remove();
                }
                if (error.name === "TimeoutError") {
                    addMessage("Request timed out. Task may still be running.", "bot");
                } else {
                    addMessage("Error connecting to server.", "bot");
                }
            }

            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
